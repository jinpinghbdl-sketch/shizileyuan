<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>变形积木识字乐园</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--c:#00D4FF;--p:#FF6B9D;--o:#FF9F43;--v:#A29BFE;--g:#7BED9F;--gold:#FFD700;--bg:#080e1a}
html,body{width:100%;height:100%;overflow:hidden;font-family:'PingFang SC','Microsoft YaHei','Helvetica Neue',sans-serif;background:var(--bg);color:#fff}
body{display:flex;flex-direction:column;position:relative}
.bg-layer{position:fixed;inset:0;z-index:0;overflow:hidden}
.bg-layer img{position:absolute;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity 2s}
.bg-layer::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(8,14,26,0.72) 0%,rgba(8,14,26,0.52) 50%,rgba(8,14,26,0.72) 100%);pointer-events:none}
.float-blocks,.stars-layer{position:fixed;inset:0;z-index:1;pointer-events:none;overflow:hidden}
.sdot{position:absolute;border-radius:50%;background:#fff;animation:tw ease-in-out infinite}
@keyframes tw{0%,100%{opacity:.05;transform:scale(1)}50%{opacity:.22;transform:scale(1.4)}}
.fblock{position:absolute;border-radius:8px;animation:fb linear infinite;opacity:.1}
@keyframes fb{0%{transform:translateY(0) rotate(0deg)}100%{transform:translateY(-120vh) rotate(18deg)}}

/* 顶部栏 */
.topbar{height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;background:rgba(0,0,0,0.4);border-bottom:1px solid rgba(255,255,255,0.06);flex-shrink:0;position:relative;z-index:5}
.logo{font-size:17px;font-weight:bold;background:linear-gradient(135deg,var(--c),var(--p));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.pb{flex:1;max-width:260px;margin:0 12px;height:7px;background:rgba(255,255,255,0.08);border-radius:10px;overflow:hidden}
.pb .fill{height:100%;border-radius:10px;transition:width .6s;background:linear-gradient(90deg,var(--c),var(--v));width:0}
.stars{display:flex;align-items:center;gap:6px;font-size:20px;color:var(--gold);font-weight:bold}
.medal{display:flex;align-items:center;gap:4px;font-size:18px;color:#E8B400;font-weight:bold;margin-right:8px}
.medal .medal-icon{font-size:22px}
.medal .medal-count{font-size:16px}
.set-selector{display:flex;gap:5px;align-items:center;margin-left:8px}
.set-btn{width:30px;height:30px;border-radius:50%;border:1.5px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.06);color:#fff;font-size:13px;font-weight:bold;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center}
.set-btn:hover{border-color:rgba(0,212,255,0.5);background:rgba(0,212,255,0.1)}
.set-btn.active{border-color:var(--c);background:rgba(0,212,255,0.18);color:var(--c);box-shadow:0 0 12px rgba(0,212,255,0.3)}

.tip{text-align:center;font-size:13px;color:rgba(255,255,255,0.32);padding:5px 0 3px;flex-shrink:0;position:relative;z-index:5}

/* 主内容区 */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;z-index:5;min-height:0}

/* ===== 篇章视图 ===== */
.passage-view{
  flex:1;display:flex;flex-direction:column;
  padding:12px 16px 8px;
  min-height:0;overflow:hidden;
}
.passage-hint{
  text-align:center;font-size:13px;color:rgba(0,212,255,0.7);
  margin-bottom:8px;flex-shrink:0;
}
.passage-grid{
  flex:1;overflow-y:auto;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(130px,1fr));
  gap:8px;
  align-content:start;
  padding-bottom:4px;
}
.passage-grid::-webkit-scrollbar{width:4px}
.passage-grid::-webkit-scrollbar-track{background:transparent}
.passage-grid::-webkit-scrollbar-thumb{background:rgba(0,212,255,0.2);border-radius:2px}
.pg-item{
  background:rgba(0,212,255,0.06);
  border:1px solid rgba(0,212,255,0.18);
  border-radius:14px;padding:10px 8px;
  text-align:center;cursor:pointer;
  transition:all .2s;user-select:none;
}
.pg-item:hover{background:rgba(0,212,255,0.14);border-color:rgba(0,212,255,0.38);transform:scale(1.03)}
.pg-item .pg-line{
  font-size:22px;font-weight:700;
  letter-spacing:4px;color:#fff;line-height:1.3;
}
.passage-action{
  flex-shrink:0;display:flex;justify-content:center;align-items:center;
  gap:12px;margin-top:10px;
}
.start-btn{
  padding:10px 36px;background:linear-gradient(135deg,var(--c),var(--v));
  border:none;border-radius:28px;color:#fff;font-size:16px;font-weight:bold;
  cursor:pointer;transition:all .2s;box-shadow:0 4px 22px rgba(0,212,255,0.3);
}
.start-btn:hover{transform:scale(1.06);box-shadow:0 6px 28px rgba(0,212,255,0.5)}
.all-speak-btn{
  padding:10px 26px;background:rgba(255,215,0,0.12);
  border:1.5px solid rgba(255,215,0,0.45);border-radius:28px;
  color:#FFD700;font-size:15px;font-weight:bold;cursor:pointer;
  transition:all .2s;
}
.all-speak-btn:hover{background:rgba(255,215,0,0.2);transform:scale(1.06)}
.all-speak-btn.speaking{background:rgba(255,215,0,0.25);border-color:#FFD700;box-shadow:0 0 16px rgba(255,215,0,0.35)}
.back-btn{
  padding:10px 22px;background:rgba(255,255,255,0.07);
  border:1px solid rgba(255,255,255,0.15);border-radius:28px;
  color:#fff;font-size:14px;cursor:pointer;transition:all .2s;
}
.back-btn:hover{background:rgba(255,255,255,0.12)}

/* ===== 识字卡视图 ===== */
.card-nav{
  display:flex;align-items:center;justify-content:center;
  padding:6px 0 4px;flex-shrink:0;
}
.back-btn2{
  background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);
  color:#fff;border-radius:14px;padding:5px 18px;font-size:14px;cursor:pointer;
  transition:background .2s;
}
.back-btn2:hover{background:rgba(255,255,255,0.15)}
.card-view{
  flex:1;display:flex;gap:0;
  padding:10px 14px 8px;
  min-height:0;overflow:hidden;
}
.lcard{
  flex:0 0 47%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(0,212,255,0.04);
  border:1px solid rgba(0,212,255,0.15);
  border-radius:22px;padding:14px 12px;
  position:relative;min-height:0;overflow-y:auto;overflow-x:hidden;
  cursor:pointer;
}
.lcard:hover{border-color:rgba(0,212,255,0.38)}
.bcorner{position:absolute;top:8px;left:10px;display:flex;gap:3px}
.bc{width:12px;height:12px;border-radius:3px;background:var(--c);opacity:.42;box-shadow:inset -1px -1px 0 rgba(0,0,0,0.2)}
.bc:nth-child(2){background:var(--p)}.bc:nth-child(3){background:var(--o)}.bc:nth-child(4){background:var(--v)}
.top-blks{position:absolute;top:8px;right:10px;display:flex;gap:3px}
.tb{height:18px;min-width:14px;padding:0 4px;border-radius:3px;font-size:9px;display:flex;align-items:center;justify-content:center;font-weight:bold;color:rgba(255,255,255,0.75);box-shadow:inset -1px -1px 0 rgba(0,0,0,0.2)}
.avatar{width:54px;height:54px;border-radius:50%;border:2px solid rgba(0,212,255,0.2);background:rgba(0,212,255,0.08);display:flex;align-items:center;justify-content:center;font-size:26px;margin-bottom:6px}
.pinyin{font-size:28px;color:rgba(0,212,255,0.95);letter-spacing:4px;font-weight:300;text-shadow:0 0 18px rgba(0,212,255,0.4)}
.bigchar{
  font-size:clamp(100px,17vw,190px);line-height:1;font-weight:900;
  -webkit-text-fill-color:transparent;
  -webkit-text-stroke:1px rgba(0,212,255,0.7);
  filter:drop-shadow(0 0 30px rgba(0,212,255,0.28));
  user-select:none;transition:transform .4s cubic-bezier(.34,1.56,.64,1);
  cursor:pointer;
}
.bigchar.pop{animation:cp .5s cubic-bezier(.34,1.56,.64,1)}
@keyframes cp{0%{transform:scale(.5) rotate(-5deg);opacity:0}60%{transform:scale(1.12) rotate(2deg);opacity:1}100%{transform:scale(1) rotate(0)}}

/* 短语标签（小字版，在大字下方） */
.chara-tag{
  /* 左卡底部（pos 0-1），pos 2-3 时 JS 改为 .tag-top 推到顶部 */
  margin-top:auto;padding:5px 14px;
  background:rgba(0,212,255,0.12);border:1px solid rgba(0,212,255,0.32);
  border-radius:14px;color:rgba(0,212,255,0.88);
  text-align:center;line-height:1.5;font-size:20px;
  transition:all .3s;
}
.chara-tag.tag-top{margin-top:0}
.chara-tag .tag-hl{color:var(--c);font-weight:900;font-size:1.35em;text-shadow:0 0 14px var(--c)}
.chara-tag .tag-dim{color:rgba(0,212,255,0.55);font-weight:600}

.phrases{margin-top:auto;display:flex;flex-wrap:wrap;gap:4px;justify-content:center;max-width:100%}
.phrase{
  padding:5px 14px 4px;
  background:rgba(0,212,255,0.07);border:1px solid rgba(0,212,255,0.22);
  border-radius:12px;cursor:pointer;transition:all .2s;text-align:center;user-select:none;
}
.phrase:hover{background:rgba(0,212,255,0.16);transform:scale(1.04)}
.phrase .pp{font-size:32px;color:rgba(100,220,255,1);display:block;line-height:1;margin-bottom:2px;text-shadow:0 0 12px rgba(0,212,255,0.85)}
.phrase .pw{font-size:52px;color:#fff;font-weight:700;letter-spacing:1px;line-height:1}
.speakbtn{
  margin-top:auto;display:flex;align-items:center;gap:5px;
  padding:5px 14px;
  background:rgba(0,212,255,0.09);border:1px solid rgba(0,212,255,0.25);
  border-radius:20px;color:var(--c);font-size:13px;cursor:pointer;transition:all .2s;
}
.speakbtn:hover{background:rgba(0,212,255,0.18);transform:scale(1.05)}

.div{width:1px;margin:0 8px;background:linear-gradient(to bottom,transparent,rgba(255,255,255,0.08),transparent);flex-shrink:0}

.rcard{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:space-between;
  background:rgba(255,107,157,0.04);border:1px solid rgba(255,107,157,0.15);
  border-radius:22px;padding:18px 18px;position:relative;min-height:0;overflow-y:auto;overflow-x:hidden;
}
.rlabel{position:absolute;top:12px;right:14px;font-size:11px;color:rgba(255,107,157,0.5)}
.rc-tag{
  /* 默认顶部，固定在顶部（pos 2-3），pos 0-1 时追加 .tag-bottom */
  margin-bottom:10px;padding:5px 14px;
  background:rgba(255,107,157,0.12);border:1px solid rgba(255,107,157,0.35);
  border-radius:14px;font-size:20px;color:rgba(255,107,157,0.88);
  text-align:center;line-height:1.5;
  /* 禁止 flex-reverse 或 direction 导致的字序颠倒 */
  display:block;
  transition:all .3s;
}
.rc-tag.tag-bottom{margin-bottom:0;margin-top:auto}
.rc-tag .tag-hl2{color:var(--p);font-weight:900;font-size:1.35em;text-shadow:0 0 14px var(--p)}
.rc-tag .tag-dim2{color:rgba(255,107,157,0.55);font-weight:600}
.rchar{font-size:clamp(48px,7vw,70px);line-height:1;margin-bottom:10px;background:linear-gradient(135deg,var(--p),var(--o));-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:su .4s ease;font-weight:900}
@keyframes su{from{opacity:0;transform:translateY(15px)}to{opacity:1;transform:translateY(0)}}
.stext{font-size:clamp(28px,4.5vw,42px);line-height:2.4;letter-spacing:2px;color:rgba(255,255,255,0.92);text-align:center;max-width:100%;animation:su .5s ease .1s both;cursor:pointer;transition:background .2s;padding:8px 20px;border-radius:10px}
.stext:hover{background:rgba(255,255,255,0.06)}
.stext .hl{color:var(--p);font-weight:bold;text-decoration:underline;text-decoration-color:rgba(255,107,157,0.45);text-underline-offset:3px}
.listenbtn{margin-top:16px;padding:12px 28px;background:linear-gradient(135deg,var(--p),var(--v));border:none;border-radius:30px;color:#fff;font-size:15px;font-weight:bold;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:9px;box-shadow:0 4px 22px rgba(255,107,157,0.35)}
.listenbtn:hover{transform:scale(1.07);box-shadow:0 6px 28px rgba(255,107,157,0.5)}
.listenbtn.on{animation:mo 1s infinite;box-shadow:0 4px 38px rgba(255,107,157,0.65)}
@keyframes mo{0%,100%{box-shadow:0 4px 22px rgba(255,107,157,0.35)}50%{box-shadow:0 4px 48px rgba(255,107,157,0.7)}}
.lstatus{margin-top:7px;font-size:12px;color:rgba(255,255,255,0.32);text-align:center;min-height:16px;min-width:160px;transition:color .3s}
.lstatus.listening{color:var(--c)}
.lstatus.match{color:var(--g);font-weight:bold}
.lstatus.no-match{color:var(--p)}
.wave-ring{position:absolute;inset:0;border-radius:30px;border:2px solid var(--p);opacity:0;pointer-events:none}
.wave-ring.active{animation:wring 1.2s ease-out infinite}
@keyframes wring{0%{opacity:.6;transform:scale(1)}100%{opacity:0;transform:scale(1.4)}}

/* 底部栏 */
.botbar{height:136px;display:flex;align-items:center;justify-content:center;gap:16px;padding:0 14px;background:rgba(0,0,0,0.35);border-top:1px solid rgba(255,255,255,0.05);flex-shrink:0;position:relative;z-index:5}
.back-passage{
  position:absolute;left:14px;top:50%;transform:translateY(-50%);
  background:rgba(0,212,255,0.12);border:1.5px solid rgba(0,212,255,0.35);
  color:var(--c);border-radius:20px;padding:7px 16px;font-size:13px;
  cursor:pointer;transition:all .2s;white-space:nowrap;
}
.back-passage:hover{background:rgba(0,212,255,0.22);transform:translateY(-50%) scale(1.04)}
.nbtn{width:52px;height:52px;border-radius:50%;border:none;background:rgba(255,255,255,0.07);color:#fff;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.nbtn:hover{transform:scale(1.12);background:rgba(255,255,255,0.13)}
.nbtn.disabled{opacity:.22;pointer-events:none}
.mbtn{width:120px;height:120px;border-radius:50%;border:2.5px solid rgba(0,212,255,0.35);background:linear-gradient(135deg,rgba(0,212,255,0.1),rgba(162,155,254,0.1));color:var(--c);font-size:48px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;box-shadow:0 0 28px rgba(0,212,255,0.18);position:relative}
.mbtn:hover{transform:scale(1.1);border-color:var(--c);box-shadow:0 0 42px rgba(0,212,255,0.3)}
.mbtn.on{border-color:var(--p);color:var(--p);animation:mo 1s infinite;box-shadow:0 0 42px rgba(255,107,157,0.45)}
.ccount{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);font-size:11px;color:rgba(255,255,255,0.22);letter-spacing:1px}

.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);padding:20px 40px;border-radius:20px;font-size:22px;font-weight:bold;z-index:2000;transition:transform .3s cubic-bezier(.34,1.56,.64,1);pointer-events:none;white-space:nowrap}
.toast.show{transform:translate(-50%,-50%) scale(1)}
.toast.ok{background:linear-gradient(135deg,var(--gold),var(--o));color:#222;box-shadow:0 8px 50px rgba(255,215,0,0.55)}
.toast.ng{background:rgba(255,60,60,0.92);color:#fff;box-shadow:0 8px 50px rgba(255,60,60,0.45)}
.burst{position:fixed;inset:0;pointer-events:none;z-index:1000;display:none}
.burst.on{display:block}
.sp{position:absolute;font-size:30px;animation:sf 1.3s ease-out forwards}
@keyframes sf{0%{opacity:1;transform:scale(0) translateY(0)}30%{opacity:1;transform:scale(1.4) translateY(-30px)}100%{opacity:0;transform:scale(.6) translateY(-200px)}}
.flip{animation:fl .45s cubic-bezier(.34,1.56,.64,1)}
@keyframes fl{0%{transform:rotateY(88deg) scale(.85);opacity:0}100%{transform:rotateY(0) scale(1);opacity:1}}

/* 右侧浮动按钮 */
.autobtn{position:fixed;bottom:268px;right:16px;width:48px;height:48px;border-radius:50%;background:rgba(0,212,255,0.22);border:1.5px solid rgba(0,212,255,0.4);font-size:20px;color:var(--c);cursor:pointer;z-index:100;transition:all .2s;box-shadow:0 4px 14px rgba(0,212,255,0.18)}
.autobtn:hover{transform:scale(1.12)}
.autobtn.off{background:rgba(255,255,255,0.06);border-color:rgba(255,255,255,0.15);color:rgba(255,255,255,0.35);box-shadow:none}
.slbtn{position:fixed;bottom:210px;right:16px;width:48px;height:48px;border-radius:50%;background:rgba(255,215,0,0.85);border:none;font-size:22px;color:#222;cursor:pointer;z-index:100;transition:all .2s;box-shadow:0 4px 16px rgba(255,215,0,0.35)}
.slbtn:hover{transform:scale(1.12)}
.slbtn .bd{position:absolute;top:-5px;right:-5px;background:#FFD700;color:#222;font-size:11px;min-width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:bold}
.mictip{position:fixed;bottom:152px;left:50%;transform:translateX(-50%);background:rgba(0,212,255,0.14);border:1px solid rgba(0,212,255,0.28);color:var(--c);padding:7px 18px;border-radius:18px;font-size:12px;z-index:100;display:none;white-space:nowrap}
.mictip.show{display:block}
.tts-bubble{position:fixed;top:65px;left:50%;transform:translateX(-50%);background:rgba(0,212,255,0.12);border:1px solid rgba(0,212,255,0.3);color:var(--c);padding:5px 16px;border-radius:14px;font-size:12px;z-index:100;display:none;white-space:nowrap;transition:opacity .3s}
.tts-bubble.show{display:block}

/* 奖章全屏闪光动画 */
.medal-flash{position:fixed;inset:0;background:radial-gradient(circle,rgba(255,215,0,0.55) 0%,rgba(255,200,0,0.1) 50%,transparent 70%);z-index:900;pointer-events:none;animation:mflash 1.2s ease-out forwards}
@keyframes mflash{0%{opacity:1;transform:scale(0.2)}40%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(1.8)}}
/* 奖章飘向右上角动画：利用 left/top 定位，transform 只控制旋转和缩放 */
.medal-float{position:fixed;z-index:950;pointer-events:none;font-size:36px;opacity:1;animation:mfloat 1.4s ease-out forwards}
@keyframes mfloat{0%{opacity:1;transform:scale(1.6) rotate(-15deg);left:50%;top:50%}60%{opacity:1;transform:scale(1) rotate(5deg)}100%{opacity:0;transform:scale(0.5) rotate(0deg)}}

/* 星星本面板 */
.sp-panel{position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:500;display:none;flex-direction:column;align-items:center;padding:18px}
.sp-panel.open{display:flex}
.sp-panel-h{font-size:20px;color:var(--gold);margin-bottom:12px;display:flex;align-items:center;gap:10px}
.sp-grid{flex:1;width:100%;max-width:740px;overflow-y:auto;display:flex;flex-wrap:wrap;gap:10px;padding-bottom:10px;align-content:flex-start}
.si{display:flex;flex-direction:column;align-items:center;background:rgba(255,215,0,0.07);border:1px solid rgba(255,215,0,0.22);border-radius:14px;padding:10px 14px;cursor:pointer;transition:all .2s;min-width:80px}
.si:hover{background:rgba(255,215,0,0.14);transform:scale(1.04)}
.si .sc2{font-size:36px;font-weight:900;background:linear-gradient(135deg,var(--c),var(--p))!important;-webkit-background-clip:text!important;background-clip:text!important;-webkit-text-fill-color:transparent!important}
.si .spy{font-size:11px;color:rgba(0,212,255,0.8);margin-top:2px}
.si .smark{font-size:11px;color:var(--gold);margin-top:1px}
.nolearned{color:rgba(255,255,255,0.36);font-size:16px;margin-top:50px}
.closebtn{margin-top:10px;padding:8px 26px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.18);border-radius:22px;color:#fff;font-size:14px;cursor:pointer}



@media(max-width:680px){
  .main{flex-direction:column;padding:8px}
  .lcard{flex:0 0 auto;min-height:44vh}
  .div{width:100%;height:1px;margin:6px 0}
  .rcard{flex:1}
  .pb{max-width:120px}
  .set-btn{width:26px;height:26px;font-size:11px}
}
</style>
</head>
<body>

<div class="bg-layer" id="bgL">
  <img id="bi0" src="assets/11.jpg" alt="">
  <img id="bi1" src="assets/12.jpeg" alt="">
</div>
<div class="float-blocks" id="fb"></div>
<div class="stars-layer" id="sl"></div>

// ===== 字库加载 =====
let allSets=[];
let D=[];
let curSet=1;

function loadSets(){
  try{
    const data=__BLOCKS_DATA__;
    allSets=data.sets||data;
    if(!Array.isArray(allSets)||allSets.length===0){alert('字库加载失败');return}
    buildSetBtns();
    const savedSet=parseInt(localStorage.getItem('lsSet')||'1');
    const safeSet=Math.min(Math.max(savedSet,1),allSets.length);
    switchSet(safeSet,true);
  }catch(e){alert('字库解析失败: '+e)}
}

function switchSet(n,restore){
  cancelPendingSpeeches();
  curSet=n;
  const raw=allSets[n-1]?allSets[n-1].chars:allSets[0].chars;
  D=raw.map(w=>({
    c:w.char||'',
    p:w.pinyin||'',
    w:(w.word||[]).map(x=>typeof x==='string'?{w:x,p:''}:x),
    s:w.sentence||'',
    e:w.emoji||w.char||'',
    bc:w.blockColor||'#00D4FF',
    cc:w.color||'#FF6B9D'
  }));
  score=0;
  buildSetBtns();
  renderPassageView();
  let startIdx=0;
  if(restore){
    const savedIdx=parseInt(localStorage.getItem('lsIdx_'+n)||'0');
    startIdx=Math.min(Math.max(savedIdx,0),D.length-1);
  }
  idx=startIdx;
  localStorage.setItem('lsSet',n);
  switchBgForSet(n);
  renderCard();
  updateUI();
  if(autoSpeakOn){pendingSpeeches.push(setTimeout(()=>autoSpeak(),400));}
}

function buildSetBtns(){
  const el=$('#setSelector');
  el.innerHTML='';
  allSets.forEach((_,i)=>{
    const b=document.createElement('button');
    b.className='set-btn'+(i+1===curSet?' active':'');
    b.textContent=i+1;
    b.onclick=()=>switchSet(i+1,false);
    el.appendChild(b);
  });
}

function startLearning(){
  // 在当前套篇章中找第一个实际存在的字（避免篇章首字不在字库的情况）
  const pl=getPASSAGE_LINES();
  const chars=(allSets[curSet-1].chars||allSets[curSet-1]);
  const charSet=new Set(chars.map(x=>x.char));
  let pos=-1;
  for(const pair of pl){
    for(const ch of pair){
      if(charSet.has(ch)){pos=chars.findIndex(x=>x.char===ch);break}
    }
    if(pos>=0)break;
  }
  if(pos<0)pos=0; // 兜底
  idx=pos;
  localStorage.setItem('lsIdx_'+curSet,idx);
  switchView('card');
  renderCard();
  updateUI();
  if(autoSpeakOn) pendingSpeeches.push(setTimeout(()=>autoSpeak(),300));
}

function getPASSAGE_LINES(){return PASSAGE_LINES_BY_SET[curSet]||PASSAGE_LINES_BY_SET[1];}

function renderPassageView(){
  const grid=$('#passageGrid');
  grid.innerHTML='';
  const setLabel=$('#passageHint');
  const pl=getPASSAGE_LINES();
  const passageTotal=pl.length * 4;
  setLabel.textContent=`📖 第${curSet}课 · 共${pl.length}组顺口溜（${passageTotal}字）`;

  pl.forEach((line,lineIdx)=>{
    const item=document.createElement('div');
    item.className='pg-item';
    item.innerHTML=`<div class="pg-line">${line}</div>`;
    item.onclick=()=>{
      // 朗读这行
      stopCurrentSpeech();
      const utt=new SpeechSynthesisUtterance(line);
      ensureVoice();utt.voice=cVoice;utt.lang='zh-CN';
      utt.rate=0.88;utt.pitch=1.15;
      showBubble('🔊 '+line);
      speechSynthesis.speak(utt);
      // 高亮效果
      item.style.background='rgba(0,212,255,0.3)';
      item.style.borderColor='var(--c)';
      setTimeout(()=>{
        item.style.background='';
        item.style.borderColor='';
      },1200);
    };
    grid.appendChild(item);
  });
}

// 全部朗读：顺序朗读所有顺口溜组
let isSpeakingAll=false;
let speakAllIdx=0;
function speakAllPassage(){
  if(isSpeakingAll){
    stopCurrentSpeech();
    isSpeakingAll=false;
    $('#allSpeakBtn').classList.remove('speaking');
    $('#allSpeakBtn').textContent='🔊 全部朗读';
    return;
  }
  isSpeakingAll=true;
  $('#allSpeakBtn').classList.add('speaking');
  $('#allSpeakBtn').textContent='⏹ 停止';
  speakAllIdx=0;
  showBubble('🔊 开始朗读全部顺口溜…');
  speakNextInPassage();
}
function speakNextInPassage(){
  const pl=getPASSAGE_LINES();
  if(!isSpeakingAll||speakAllIdx>=pl.length){
    isSpeakingAll=false;
    $('#allSpeakBtn').classList.remove('speaking');
    $('#allSpeakBtn').textContent='🔊 全部朗读';
    hideBubble();
    return;
  }
  const line=pl[speakAllIdx];
  // 高亮当前项
  const items=document.querySelectorAll('.pg-item');
  items.forEach((el,i)=>{
    el.style.background='';el.style.borderColor='';
    if(i===speakAllIdx){
      el.style.background='rgba(0,212,255,0.3)';
      el.style.borderColor='var(--c)';
    }
  });
  showBubble(`🔊 ${speakAllIdx+1}/${pl.length} ${line}`);
  const utt=new SpeechSynthesisUtterance(line);
  ensureVoice();utt.voice=cVoice;utt.lang='zh-CN';
  utt.rate=0.88;utt.pitch=1.15;
  utt.onend=()=>{
    speakAllIdx++;
    if(isSpeakingAll) speakNextInPassage();
  };
  utt.onerror=()=>{
    speakAllIdx++;
    if(isSpeakingAll) speakNextInPassage();
  };
  speechSynthesis.speak(utt);
}

// 根据当前卡片 idx 直接算出属于哪组顺口溜第几个字
function getTagWords(idx){
  const pl=getPASSAGE_LINES();
  const phraseIdx=Math.floor(idx/4);       // 第几组（0~32）
  const charIdx=idx%4;                     // 组内第几字（0~3）
  if(phraseIdx>=0 && phraseIdx<pl.length){
    return {phrase:pl[phraseIdx], pos:charIdx};
  }
  return {phrase:null, pos:-1};
}

}

// ===== TTS =====
let pendingSpeeches=[];
function cancelPendingSpeeches(){pendingSpeeches.forEach(t=>clearTimeout(t));pendingSpeeches=[];}
function stopCurrentSpeech(){speechSynthesis.cancel();}

function pickVoice(utt,type){
  const vs=speechSynthesis.getVoices();
  if(!vs.length)return;
  const prefs=type==='child'
    ? ['Aria','Xiaoxiao','Huihui','Yaoyao','HuHu']
    : ['Aria','Xiaoxiao'];
  let v=vs.find(x=>prefs.some(p=>x.name.includes(p))&&x.lang.includes('zh'));
  v=v||vs.find(x=>x.lang.includes('zh'))||vs[0];
  utt.voice=v;utt.lang=v.lang;
}

// ──────────────────────────────────────────────
// v7 可靠顺序朗读（状态机 + 防重 + 温柔女声）
// ──────────────────────────────────────────────
function ensureVoice(){
  if(cVoice) return;
  const vs=window.speechSynthesis.getVoices();
  // voices 未加载（Safari/Edge 等），等待 voiceschanged 后再查找
  if(!vs.length){
    const prevOnVoices=speechSynthesis.onvoiceschanged;
    speechSynthesis.onvoiceschanged=()=>{
      const vvs=window.speechSynthesis.getVoices();
      const zh=['Aria','Xiaoxiao','Huaiting','Yaoyao','Yunyang'].find(n=>
        vvs.find(v=>v.name.includes(n)&&(v.lang.startsWith('zh')||v.lang.includes('CN')))
      );
      if(zh) cVoice=vvs.find(v=>v.name.includes(zh));
      if(!cVoice) cVoice=vvs.find(v=>v.lang.startsWith('zh')||v.lang.includes('CN'))||vvs[0];
      if(prevOnVoices) prevOnVoices();
    };
    return;
  }
  const zh=['Aria','Xiaoxiao','Huaiting','Yaoyao','Yunyang'].find(n=>
    vs.find(v=>v.name.includes(n)&&(v.lang.startsWith('zh')||v.lang.includes('CN')))
  );
  if(zh) cVoice=vs.find(v=>v.name.includes(zh));
  if(!cVoice) cVoice=vs.find(v=>v.lang.startsWith('zh')||v.lang.includes('CN'))||vs[0];
}
function nextUtterance(text,rate,onDone,seqId){
  const sid=seqId!==undefined?seqId:currentSeqId;
  if(sid!==currentSeqId) return;
  if(!window.speechSynthesis) return;
  ensureVoice();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='zh-CN';u.rate=rate;u.pitch=1.15;u.volume=1;
  if(cVoice) u.voice=cVoice;
  u.onstart=()=>{if(sid!==currentSeqId) return;showBubble('🔊 '+text.slice(0,8)+(text.length>8?'…':''))};
  u.onend=()=>{if(sid===currentSeqId) onDone()};
  u.onerror=()=>{if(sid===currentSeqId) onDone()};
  try{window.speechSynthesis.speak(u)}catch(e){}
}

function speakChar(){
  // ✅ 参考V8：单句合并朗读，字符动画效果
  cancelPendingSpeeches();
  const item=D[idx];if(!item)return;
  const allWords=item.w.map(w=>w.w).join('，');
  const seqId=++currentSeqId;
  // 单句朗读：字符 + 所有词语合并（与V8完全一致）
  if(window.speechSynthesis){
    try{window.speechSynthesis.cancel()}catch(e){}
    ensureVoice();
    const u=new SpeechSynthesisUtterance(item.c+'，'+allWords);
    u.lang='zh-CN';u.rate=0.82;u.pitch=1.15;u.volume=1;
    if(cVoice) u.voice=cVoice;
    u.onstart=()=>{if(seqId===currentSeqId) showBubble('🔊 '+item.c+'…')};
    u.onend=()=>{if(seqId===currentSeqId) showBubble('')};
    u.onerror=()=>{if(seqId===currentSeqId) showBubble('')};
    try{window.speechSynthesis.speak(u)}catch(e){}
  }
  // 字符弹出动画（与V8完全一致）
  const bc=$('#bc');
  if(bc){bc.classList.remove('pop');void bc.offsetWidth;bc.classList.add('pop');setTimeout(()=>bc.classList.remove('pop'),600);}
}

function autoSpeak(){
  // ✅ 与V8完全一致的实现（含本地 ensureVoice/nextUtterance/run）
  cancelPendingSpeeches();
  try{window.speechSynthesis&&window.speechSynthesis.cancel()}catch(e){}
  const w=D[idx];if(!w) return;
  const seqId=++currentSeqId;
  const wordCount=w.w?w.w.length:0;
  let step=0;
  function ensureVoice(){
    if(cVoice) return;
    const vs=window.speechSynthesis.getVoices();
    const zh=['Aria','Xiaoxiao','Huaiting','Yaoyao','Yunyang'].find(n=>
      vs.find(v=>v.name.includes(n)&&(v.lang.startsWith('zh')||v.lang.includes('CN')))
    );
    if(zh) cVoice=vs.find(v=>v.name.includes(zh));
    if(!cVoice) cVoice=vs.find(v=>v.lang.startsWith('zh')||v.lang.includes('CN'))||vs[0];
  }
  function nextUtterance(text,rate,onDone){
    if(seqId!==currentSeqId) return;
    if(!window.speechSynthesis) return;
    ensureVoice();
    const u=new SpeechSynthesisUtterance(text);
    u.lang='zh-CN';u.rate=rate;u.pitch=1.15;u.volume=1;
    if(cVoice) u.voice=cVoice;
    u.onstart=()=>{if(seqId!==currentSeqId) return;showBubble('🔊 '+text.slice(0,8)+(text.length>8?'…':''))};
    u.onend=()=>{if(seqId===currentSeqId) onDone()};
    u.onerror=()=>{if(seqId===currentSeqId) onDone()};
    try{window.speechSynthesis.speak(u)}catch(e){}
  }
  function run(){
    if(seqId!==currentSeqId) return;
    if(step===0){
      nextUtterance(w.c,0.88,()=>{step++;setTimeout(run,200)});
    } else if(step<=wordCount){
      nextUtterance(w.w[step-1].w,0.88,()=>{step++;setTimeout(run,0)});
    } else if(step===wordCount+1){
      nextUtterance(w.s,0.75,()=>{step++});
    }
  }
  run();
}

function speakWord(word){
  cancelPendingSpeeches();
  const seqId=++currentSeqId;
  nextUtterance(word,0.88,()=>{});
}

function speakSentence(){
  cancelPendingSpeeches();
  const item=D[idx];if(!item)return;
  const seqId=++currentSeqId;
  nextUtterance(item.s,0.75,()=>{});
}

function autoSpeakChar(){
  cancelPendingSpeeches();
  const item=D[idx];if(!item)return;
  const seqId=++currentSeqId;
  nextUtterance(item.c,0.88,()=>{});
}

function speakWords(item){ item.w.slice(0,3).forEach((w,i)=>{
    setTimeout(()=>speakWord(w.w),i*900);
  });}

function showBubble(txt){

// ===== 语音识别（权限预热 + stream复用，file:// 也能只弹一次）=====
let audioStream=null; // 全局持有，rec.start() 复用同一 stream，不再弹窗

function tgl(){
  if(onL){stopL();return}
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){toast('😢 当前浏览器不支持语音识别，请用Chrome/Edge/Safari！','ng');return}
  startRecognition();
}
function stopL(){
  if(rec){try{rec.stop();}catch(e){}}
  onL=false;
  updateMicUI(false);
  // ⚠️ 不要 rec=null！保持实例不断，维持浏览器权限上下文
}
function startRecognition(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(rec){try{rec.abort();}catch(e){}}
  // ⚠️ 不要 rec=null！保持实例不断，维持浏览器权限上下文
  try{
    rec=new SR();
    rec.lang='zh-CN';
    rec.continuous=false;
    rec.interimResults=true;
    rec.maxAlternatives=1;
    rec.onstart=()=>{onL=true;updateMicUI(true);const lst=$('#lst');if(lst){lst.textContent='🎤 请朗读…';lst.className='lstatus listening';}};
    rec.onresult=e=>{
      let finalTx='';let interim='';
      for(let i=e.resultIndex;i<e.results.length;i++){
        const t=e.results[i][0].transcript;
        if(e.results[i].isFinal)finalTx+=t;else interim+=t;
      }
      const display=finalTx||interim;
      const lst=$('#lst');if(lst){lst.textContent='你说：'+display;lst.className='lstatus listening';}
      if(finalTx){stopL();setTimeout(()=>check(finalTx.trim()),100);}
    };
    rec.onend=()=>{
      onL=false;updateMicUI(false);
      const lst=$('#lst');
      if(lst&&!lst.textContent.includes('✅')&&!lst.textContent.includes('你说的是')){
        lst.textContent='没听清？再点🎤朗读一次';lst.className='lstatus no-match';
        setTimeout(()=>{if(!onL&&lst){lst.textContent='';lst.className='lstatus';}},3000);
      }
    };
    rec.onerror=e=>{
      const err=e.error;
      onL=false;updateMicUI(false);
      const lst=$('#lst');
      // ✅ 关键：aborted/no-speech 静默处理，不显示给用户，不弹窗
      if(err==='aborted'||err==='no-speech'){
        // 静默，不提示用户
      } else if(err==='not-allowed'||err==='service-not-allowed'){
        if(lst){lst.textContent='请允许麦克风权限';lst.className='lstatus warn';}
        setTimeout(()=>{if(!onL&&lst){lst.textContent='';lst.className='lstatus';}},3500);
      } else if(err==='audio-capture'){
        if(lst){lst.textContent='找不到麦克风';lst.className='lstatus warn';}
        setTimeout(()=>{if(!onL&&lst){lst.textContent='';lst.className='lstatus';}},3500);
      } else {
        if(lst){lst.textContent='识别出错，请再点🎤重试';lst.className='lstatus warn';}
        setTimeout(()=>{if(!onL&&lst){lst.textContent='';lst.className='lstatus';}},3500);
      }
    };
    rec.start();
  }catch(e){
    onL=false;updateMicUI(false);
    const lst=$('#lst');if(lst){lst.textContent='🎤 识别启动失败';lst.className='lstatus warn';}
    setTimeout(()=>{if(!onL&&lst){lst.textContent='';lst.className='lstatus';}},3500);
  }
}

function updateMicUI(active){
  const btn=$('#mbtn2'),lbtn=$('#lbtn'),wr=$('#wring'),tip=$('#mictip'),lst=$('#lst');
  btn.classList.toggle('on',active);
  lbtn.classList.toggle('on',active);
  wr.classList.toggle('active',active);
  tip.classList.toggle('show',active);
  if(!active)lst.textContent='';
}

function check(txt){
  const item=D[idx];
  const target=item.c;
  const ok=txt.includes(target)||txt.includes(item.p[0])||txt.includes(item.e);
  if(ok){
    $('#lst').textContent='✅ 正确！';
    $('#lst').className='lstatus match';
    if(!learned[item.c+'_'+curSet]){
      learned[item.c+'_'+curSet]=true;
      localStorage.setItem('lsL',JSON.stringify(learned));
      stars++;localStorage.setItem('lsS',stars);
      $('#sc').textContent=stars;
      $('#slbd').textContent=Object.keys(learned).length;
      checkMedal();
      playCorrectSound();
      burstStar();
    }
    delete errLib[item.c+'_'+curSet];
    localStorage.setItem('lsE',JSON.stringify(errLib));
    pendingSpeeches.push(setTimeout(()=>next(),700));
  } else {
    $('#lst').textContent='❌ 再试一次';
    $('#lst').className='lstatus no-match';
    if(!errLib[item.c+'_'+curSet]){
      errLib[item.c+'_'+curSet]=true;
      localStorage.setItem('lsE',JSON.stringify(errLib));
    }
    pendingSpeeches.push(setTimeout(()=>speakChar(),500));
  }
}

// ===== 答对音效：bilingbiling 短促悦耳，不打断卡片切换 =====
let _audioCtx=null;
function getAudioCtx(){
  if(!_audioCtx) _audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  return _audioCtx;
}
function playCorrectSound(){
  try{
    const ctx=getAudioCtx();
    const blings=[
      {t:0,    f1:880,  f2:1320, d:0.11, g:0.12},
      {t:0.12, f1:1046, f2:1568, d:0.10, g:0.10},
      {t:0.23, f1:1318, f2:1976, d:0.12, g:0.08},
    ];
    blings.forEach(({t,f1,f2,d,g})=>{
      const osc=ctx.createOscillator();
      const gain=ctx.createGain();
      osc.type='sine';
      osc.frequency.setValueAtTime(f1,ctx.currentTime+t);
      osc.frequency.linearRampToValueAtTime(f2,ctx.currentTime+t+d*0.6);
      gain.gain.setValueAtTime(0,ctx.currentTime+t);
      gain.gain.linearRampToValueAtTime(g,ctx.currentTime+t+0.02);
      gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+t+d);
      osc.connect(gain);gain.connect(ctx.destination);
      osc.start(ctx.currentTime+t);osc.stop(ctx.currentTime+t+d+0.01);
    });
    // 尾音：轻柔 C-E-G 和弦
    [523,659,784].forEach((freq,i)=>{
      const o=ctx.createOscillator();
      const g=ctx.createGain();
      o.type='sine';o.frequency.value=freq;
      g.gain.setValueAtTime(0,ctx.currentTime+0.18);
      g.gain.linearRampToValueAtTime(0.055,ctx.currentTime+0.24);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.60);
      o.connect(g);g.connect(ctx.destination);
      o.start(ctx.currentTime+0.18);o.stop(ctx.currentTime+0.63);
    });
  }catch(e){console.log('[音效]',e.message)}
}

    b.appendChild(s);

  setTimeout(()=>{b.classList.remove('on');b.innerHTML='';},1500);
}

window.onload=()=>{
  initBg();

  speechSynthesis.getVoices();
  ensureVoice();
  // 备用：若 voices 延迟加载，再补一次 ensureVoice
  setTimeout(()=>{ensureVoice();},1500);
  if(speechSynthesis.onvoiceschanged!==undefined){
    speechSynthesis.onvoiceschanged=()=>{
      ensureVoice();
      loadSets();
    };
  } else {
    loadSets();
  }
  // 页面加载时预热麦克风权限（仅首次一次），后续 tgl/startRecognition 不再弹窗
  if(navigator.mediaDevices&&navigator.mediaDevices.getUserMedia){
    navigator.mediaDevices.getUserMedia({audio:true}).then(s=>{audioStream=s;}).catch(()=>{});
  }
};
